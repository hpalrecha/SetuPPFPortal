                  format: uuid
                salesPersonId:
                  type: string
                  format: uuid
                serviceId:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [PERCENT, AMOUNT]
                valueNumeric:
                  type: string
                capAmount:
                  type: string
                floorAmount:
                  type: string
                effectiveFrom:
                  type: string
                  format: date-time
                effectiveTo:
                  type: string
                  format: date-time
              required:
